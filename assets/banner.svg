<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Shuvrato Bhattacharjee - AI Engineer & Full Stack Developer">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0f1923;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowPrimary" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#58A6FF;stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0; 60,20; 0,0" dur="8s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="glowAccent" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0; -40,-15; 0,0" dur="10s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="glowSecondary" cx="60%" cy="30%" r="35%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:0"/>
    </radialGradient>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <radialGradient id="particleGrad1">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#58A6FF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="particleGrad2">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="particleGrad3">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363D" stroke-width="0.3" opacity="0.4"/>
    </pattern>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58A6FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0"/>
      <animate attributeName="x1" values="-100%;0%;100%" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;100%;200%" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0F6FC"/>
      <stop offset="50%" style="stop-color:#58A6FF"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.5,0;0.5,0;-0.5,0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="900" height="300" fill="url(#bgGrad)" rx="16"/>
  <rect width="900" height="300" fill="url(#grid)" rx="16" opacity="0.6"/>
  <rect width="900" height="300" fill="url(#glowPrimary)" rx="16"/>
  <rect width="900" height="300" fill="url(#glowAccent)" rx="16"/>
  <rect width="900" height="300" fill="url(#glowSecondary)" rx="16"/>

  <circle cx="80" cy="60" r="120" fill="#58A6FF" opacity="0.03"/>
  <circle cx="800" cy="240" r="100" fill="#A855F7" opacity="0.04"/>
  <circle cx="500" cy="150" r="80" fill="#00E676" opacity="0.02"/>

  <rect x="60" y="28" width="780" height="1" fill="url(#lineGrad)" rx="1"/>

  <circle cx="120" cy="80" r="2" fill="url(#particleGrad1)">
    <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="220" r="1.5" fill="url(#particleGrad1)">
    <animate attributeName="cy" values="220;200;220" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="100" r="2" fill="url(#particleGrad1)">
    <animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="200" r="1.5" fill="url(#particleGrad1)">
    <animate attributeName="cy" values="200;180;200" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="50" r="2" fill="url(#particleGrad2)">
    <animate attributeName="cy" values="50;35;50" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="250" r="1.5" fill="url(#particleGrad2)">
    <animate attributeName="cy" values="250;235;250" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="270" r="2" fill="url(#particleGrad2)">
    <animate attributeName="cy" values="270;255;270" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="30" r="1.5" fill="url(#particleGrad3)">
    <animate attributeName="cy" values="30;18;30" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="150" r="2" fill="url(#particleGrad3)">
    <animate attributeName="cy" values="150;135;150" dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4.8s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.15">
    <polygon points="820,30 850,60 820,60" fill="none" stroke="#58A6FF" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0,835,45; 360,835,45" dur="20s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g opacity="0.12">
    <polygon points="60,240 80,220 100,240 80,260" fill="none" stroke="#A855F7" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0,80,240; -360,80,240" dur="25s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <circle cx="860" cy="55" r="25" fill="none" stroke="#00E676" stroke-width="0.5" opacity="0.15">
    <animate attributeName="r" values="25;30;25" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="4s" repeatCount="indefinite"/>
  </circle>

  <rect x="40" y="40" width="530" height="220" rx="16" fill="#161B22" fill-opacity="0.6" stroke="#30363D" stroke-width="1" filter="url(#softShadow)"/>
  <rect x="40" y="40" width="530" height="1" rx="1" fill="#ffffff" opacity="0.06"/>
  <rect x="40" y="40" width="1" height="220" rx="1" fill="#ffffff" opacity="0.04"/>

  <circle cx="68" cy="70" r="4" fill="#00E676">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="68" cy="70" r="8" fill="#00E676" opacity="0.15">
    <animate attributeName="r" values="8;14;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="82" y="75" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#00E676" opacity="0.9">available for opportunities</text>

  <text x="60" y="128" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="36" font-weight="700" fill="url(#titleGrad)" filter="url(#textGlow)" letter-spacing="-0.5">Shuvrato Bhattacharjee</text>
  <text x="62" y="158" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="400" fill="#8B949E" letter-spacing="0.3">AI Engineer  ·  Full Stack Developer  ·  CS Student</text>
  <rect x="62" y="170" width="280" height="1" fill="url(#lineGrad)" opacity="0.6"/>
  <text x="62" y="194" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8B949E">
    <tspan fill="#58A6FF" font-weight="500">📍</tspan>
    <tspan dx="4">Dhaka, Bangladesh</tspan>
  </text>

  <rect x="62" y="210" width="72" height="24" rx="12" fill="#58A6FF" fill-opacity="0.1" stroke="#58A6FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="98" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#58A6FF" text-anchor="middle" font-weight="500">AI / ML</text>
  <rect x="144" y="210" width="62" height="24" rx="12" fill="#A855F7" fill-opacity="0.1" stroke="#A855F7" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="175" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#A855F7" text-anchor="middle" font-weight="500">LLMs</text>
  <rect x="216" y="210" width="62" height="24" rx="12" fill="#00E676" fill-opacity="0.1" stroke="#00E676" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="247" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#00E676" text-anchor="middle" font-weight="500">SaaS</text>
  <rect x="288" y="210" width="74" height="24" rx="12" fill="#58A6FF" fill-opacity="0.08" stroke="#58A6FF" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="325" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#58A6FF" text-anchor="middle" font-weight="500">Open Source</text>

  <g opacity="0.25">
    <rect x="600" y="50" width="270" height="200" rx="12" fill="#161B22" fill-opacity="0.7" stroke="#30363D" stroke-width="1"/>
    <text x="620" y="80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#58A6FF">const</text>
    <text x="651" y="80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#F0F6FC">shuvrato</text>
    <text x="700" y="80" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8B949E">= {</text>
    <text x="632" y="100" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8B949E">role:</text>
    <text x="663" y="100" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#00E676">"AI Engineer"</text>
    <text x="632" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8B949E">stack:</text>
    <text x="666" y="118" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#A855F7">["Python",</text>
    <text x="666" y="134" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#A855F7">"TypeScript",</text>
    <text x="666" y="150" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#A855F7">"Next.js"]</text>
    <text x="632" y="168" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8B949E">focus:</text>
    <text x="664" y="168" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#00E676">"Building AI</text>
    <text x="664" y="184" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#00E676">SaaS products"</text>
    <text x="632" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8B949E">open:</text>
    <text x="662" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#58A6FF">true</text>
    <text x="620" y="218" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8B949E">};</text>
    <rect x="640" y="224" width="6" height="11" fill="#58A6FF" rx="1">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="60" y="270" width="780" height="1" fill="url(#lineGrad)" rx="1" opacity="0.5"/>
  <text x="450" y="288" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" fill="#8B949E" text-anchor="middle" opacity="0.5">github.com/shuvratobh</text>
</svg>
