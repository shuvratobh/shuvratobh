<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" width="900" height="60" role="img" aria-label="Section divider">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#30363D;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#58A6FF;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#00E676;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#30363D;stop-opacity:0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1,0;1,0;-1,0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <polygon points="450,20 458,30 450,40 442,30" fill="#30363D" stroke="#58A6FF" stroke-width="0.8" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="450,22 456,30 450,38 444,30" fill="#58A6FF" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </polygon>
  <line x1="0" y1="30" x2="900" y2="30" stroke="url(#divGrad)" stroke-width="1"/>
  <circle cx="340" cy="30" r="2" fill="#58A6FF" opacity="0.6"/>
  <circle cx="380" cy="30" r="1.5" fill="#A855F7" opacity="0.4"/>
  <circle cx="415" cy="30" r="1" fill="#58A6FF" opacity="0.3"/>
  <circle cx="560" cy="30" r="2" fill="#A855F7" opacity="0.6"/>
  <circle cx="520" cy="30" r="1.5" fill="#00E676" opacity="0.4"/>
  <circle cx="485" cy="30" r="1" fill="#A855F7" opacity="0.3"/>
</svg>
