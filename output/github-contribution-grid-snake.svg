<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 112" width="860" height="112" role="img" aria-label="Contribution snake placeholder — will be auto-generated by GitHub Actions">
  <defs>
    <linearGradient id="snakeDarkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#161B22"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
  </defs>
  <rect width="860" height="112" fill="url(#snakeDarkGrad)" rx="8"/>
  <text x="430" y="50" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8B949E" text-anchor="middle">🐍 Contribution snake will appear here after the first GitHub Actions run.</text>
  <text x="430" y="72" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#58A6FF" text-anchor="middle" opacity="0.7">Run: Actions → Generate Contribution Snake → Run workflow</text>
  <g opacity="0.15">
    <rect x="20" y="90" width="10" height="10" rx="2" fill="#00E676"/>
    <rect x="34" y="90" width="10" height="10" rx="2" fill="#00E676"/>
    <rect x="48" y="90" width="10" height="10" rx="2" fill="#58A6FF"/>
    <rect x="62" y="90" width="10" height="10" rx="2" fill="#A855F7"/>
    <rect x="76" y="90" width="10" height="10" rx="2" fill="#00E676"/>
    <rect x="90" y="90" width="10" height="10" rx="2" fill="#58A6FF"/>
  </g>
</svg>
